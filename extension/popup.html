<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --glow-color: rgba(148, 163, 184, 0.18);
    --border-color: rgba(148, 163, 184, 0.35);
  }
  html, body {
    margin: 0;
    padding: 0;
    border-radius: 20px;
    overflow: hidden;
  }
  body {
    width: 336px;
    padding: 12px;
    background: #0b0f19;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e5e7eb;
  }
  body.state-safe    { --glow-color: rgba(34, 197, 94, 0.45);  --border-color: rgba(34, 197, 94, 0.6); }
  body.state-unsafe  { --glow-color: rgba(239, 68, 68, 0.45); --border-color: rgba(239, 68, 68, 0.6); }
  body.state-neutral { --glow-color: rgba(148, 163, 184, 0.18); --border-color: rgba(148, 163, 184, 0.35); }

  .card {
    background: #131a26;
    border-radius: 20px;
    padding: 22px 20px;
    border: 1px solid var(--border-color);
    box-shadow: 0 0 14px 2px var(--glow-color);
    transition: box-shadow .3s ease, border-color .3s ease;
    text-align: center;
  }

  h1 {
    font-size: 16px; font-weight: 700; margin: 0 0 14px; padding-bottom: 12px;
    color: #f9fafb; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .site-name { font-size: 13px; color: #e5e7eb; margin-bottom: 3px; }
  .url { font-size: 12px; color: #9ca3af; word-break: break-all; margin-bottom: 14px; }

  .badge {
    display: inline-block; padding: 4px 16px; border-radius: 9999px; background: transparent;
    font-weight: 700; font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid currentColor;
  }
  .safe { color: #4ade80; }
  .unsafe { color: #f87171; }
  .unknown { color: #9ca3af; }

  .note { font-size: 12px; color: #9ca3af; margin-top: 12px; }
  .helper-text { font-size: 13px; color: #9ca3af; margin-top: 10px; line-height: 1.45; }

  button#checkBtn {
    width: 100%; background: #2563eb; color: white; border: none; border-radius: 9999px;
    padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 18px;
    transition: transform .12s ease, background .2s ease, opacity .2s ease;
  }
  button#checkBtn:hover:not(:disabled) { background: #3b74f0; }
  button#checkBtn:active:not(:disabled) { transform: scale(.97); }
  button#checkBtn:disabled { opacity: .55; cursor: not-allowed; }

  .toggle-row {
    display: flex; align-items: center; justify-content: center;
    margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.08);
    font-size: 13px; color: #d1d5db;
  }
  .toggle-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #2563eb; cursor: pointer; }
</style>
</head>
<body class="state-neutral">
  <div class="card">
    <h1>Phishing URL Checker</h1>
    <div class="site-name" id="siteName"></div>
    <div class="url" id="currentUrl">Loading...</div>
    <div id="statusArea"><span class="badge unknown">Not yet checked</span></div>
    <button id="checkBtn">Check this page</button>

    <div class="toggle-row">
      <label><input type="checkbox" id="autoCheckToggle" /> Auto-check</label>
    </div>
  </div>

<script src="popup.js"></script>
</body>
</html>
